server {
    listen 80;

    # Backend - Autenticação (/auth/login e /auth/register)
    location /auth/ {
        proxy_pass http://cadmed-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend - API Geral (/api/medicos, /api/pacientes e /api/agendamentos)
    location /api/ {
        proxy_pass http://cadmed-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend - Angular (Essa regra tem que ficar SEMPRE por último!)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
