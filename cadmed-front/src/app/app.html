<div [ngClass]="{'app-wrapper': authService.isAutenticado(), 'menu-open': menuAberto}">

  <header class="header" *ngIf="authService.isAutenticado()">
    <button class="menu-toggle" type="button" (click)="alternarMenu()" aria-label="Abrir menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="brand">
      <div class="logo-icon">⚕️</div>
      <div class="brand-text">
        <h1 class="gradient-text">CadMed</h1>
        <span class="subtitle">Portal Clínico Inteligente</span>
      </div>
    </div>

    <button class="btn-logout" (click)="sair()" title="Encerrar Sessão">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Sair
    </button>

  </header>

  <button
    class="sidebar-backdrop"
    type="button"
    *ngIf="authService.isAutenticado() && menuAberto"
    (click)="fecharMenu()"
    aria-label="Fechar menu"
  ></button>

  <aside class="sidebar" *ngIf="authService.isAutenticado()" [class.open]="menuAberto">
    <div class="sidebar-header">
      <div>
        <strong>Menu</strong>
        <span>Navegação principal</span>
      </div>
      <button class="sidebar-close" type="button" (click)="fecharMenu()" aria-label="Fechar menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <nav class="main-nav" aria-label="Navegação principal">
      <ul class="nav-list">
        <li>
          <a routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="nav-item" (click)="fecharMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12l9-9 9 9"></path>
              <path d="M9 21V9h6v12"></path>
            </svg>
            <span>Início</span>
          </a>
        </li>
        <li *ngIf="authService.isSecretaria() || authService.isMedico() || authService.isPaciente()">
          <a routerLink="/agenda" routerLinkActive="active-link" class="nav-item" (click)="fecharMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Agenda</span>
          </a>
        </li>
        <li *ngIf="authService.isSecretaria()">
          <a routerLink="/pacientes" routerLinkActive="active-link" class="nav-item" (click)="fecharMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Pacientes</span>
          </a>
        </li>
        <li *ngIf="authService.isSecretaria()">
          <a routerLink="/medicos" routerLinkActive="active-link" class="nav-item" (click)="fecharMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20"></path>
              <path d="M7 7h10"></path>
              <path d="M7 17h10"></path>
              <path d="M5 12h14"></path>
            </svg>
            <span>Corpo Clínico</span>
          </a>
        </li>
        <li *ngIf="authService.isSecretaria()">
          <a routerLink="/financeiro" routerLinkActive="active-link" class="nav-item" (click)="fecharMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            <span>Financeiro</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <main [ngClass]="authService.isAutenticado() ? 'main-content' : 'login-container'">

    <div [ngClass]="{'content-wrapper': authService.isAutenticado()}">
      <router-outlet></router-outlet>
    </div>

  </main>

  <app-toast></app-toast>
</div>
