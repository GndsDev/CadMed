<div *ngIf="!authService.isAutenticado()" class="login-container">
  <router-outlet></router-outlet>
</div>

<div *ngIf="authService.isAutenticado()" class="app-wrapper">

  <header class="header">

    <div class="brand">
        <div class="logo-icon" >⚕️</div>
      <div class="brand-text">
        <h1 class="gradient-text">CadMed</h1>
        <span class="subtitle">Portal Clínico Inteligente</span>
      </div>
    </div>

    <nav class="main-nav">
      <ul class="nav-list">

        <li>
          <a routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
            <span>Início</span>
          </a>
        </li>

        <li *ngIf="authService.isSecretaria() || authService.isMedico() ||authService.isPaciente()">
          <a routerLink="/agenda" routerLinkActive="active-link" class="nav-item">
            <span>Agenda</span>
          </a>
        </li>

        <li *ngIf="authService.isSecretaria()">
          <a routerLink="/pacientes" routerLinkActive="active-link" class="nav-item">
            <span>Pacientes</span>
          </a>
        </li>

        <li *ngIf="authService.isSecretaria()">
          <a routerLink="/medicos" routerLinkActive="active-link" class="nav-item">
            <span>Corpo Clínico</span>
          </a>
        </li>

        <li *ngIf="authService.isSecretaria()">
          <a routerLink="/financeiro" routerLinkActive="active-link" class="nav-item">
            <span>Financeiro</span>
          </a>
        </li>

      </ul>
    </nav>

    <button class="btn-logout" (click)="sair()" title="Encerrar Sessão">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Sair
    </button>

  </header>

  <main class="main-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-toast></app-toast>
</div>
