<div *ngIf="!authService.isAutenticado()" class="login-container">
  <router-outlet></router-outlet>
</div>

<div *ngIf="authService.isAutenticado()" class="app-wrapper">
  <!-- Header -->
  <header class="header" style="display: flex; justify-content: space-between; align-items: center;">
    <div class="brand">
      <div class="logo-icon" routerLink="/dashboard" style="cursor: pointer;">⚕️</div>
      <div class="brand-text">
        <h1 class="gradient-text">CadMed</h1>
        <span class="subtitle">Portal Clínico Inteligente</span>
      </div>
    </div>
    <button class="btn-logout" (click)="sair()">
      Sair
    </button>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-wrapper">
      <!-- Breadcrumb Navigation -->
      <app-breadcrumb></app-breadcrumb>

      <!-- Page Content -->
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
