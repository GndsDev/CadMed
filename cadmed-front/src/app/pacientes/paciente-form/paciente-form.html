<section class="form-section">
  <div class="glass-card form-container">

    <div class="form-header">
      <div class="header-titles">
        <h2>{{ isEdicao ? 'Editar Paciente' : 'Cadastrar Paciente' }}</h2>
        <p class="text-muted">
          {{ isEdicao ? 'Atualize os dados de contacto e identificação do paciente.' : 'Preencha os dados para registar um novo paciente na clínica.' }}
        </p>
      </div>
    </div>

    <div class="form-body">
      <form (ngSubmit)="salvar()" #pacienteForm="ngForm">

        <div class="form-grid">

          <div class="form-group span-2">
            <label>Nome Completo</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="text" class="modern-input" [(ngModel)]="paciente.nome" name="nome" placeholder="Ex: Maria Oliveira" required>
            </div>
          </div>

          <div class="form-group">
            <label>CPF</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              <input type="text" class="modern-input" [(ngModel)]="paciente.cpf" name="cpf" placeholder="Ex: 000.000.000-00" required>
            </div>
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              <input type="text" class="modern-input" [(ngModel)]="paciente.telefone" name="telefone" placeholder="Ex: (00) 00000-0000" required>
            </div>
          </div>

          <div class="form-group span-2">
            <label>Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              <input type="email" class="modern-input" [(ngModel)]="paciente.email" name="email" placeholder="Ex: paciente@email.com" required>
            </div>
          </div>

        </div>

        <div class="divider"></div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
          <button type="submit" class="btn btn-primary">
            {{ isEdicao ? 'Salvar Alterações' : 'Cadastrar Paciente' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</section>
