<section class="form-section">
  <div class="glass-card form-container">

    <div class="form-header">
      <div class="header-titles">
        <h2>{{ isEdicao ? 'Editar Médico' : 'Cadastrar Médico' }}</h2>
        <p class="text-muted">
          {{ isEdicao ? 'Atualize as informações do corpo clínico.' : 'Preencha os dados para registar um novo médico na clínica.' }}
        </p>
      </div>
    </div>

    <div class="form-body">
      <form (ngSubmit)="salvar()" #medicoForm="ngForm">
        <div class="form-grid">

          <div class="form-group span-2">
            <label>Nome Completo</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input type="text" class="modern-input" [(ngModel)]="medico.nome" name="nome" placeholder="Ex: Dr. Carlos Mendes" required>
            </div>
          </div>

          <div class="form-group">
            <label>CRM</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="10.5" r="1.5"></circle>
                <line x1="21" y1="15" x2="3" y2="15"></line>
              </svg>
              <input type="text"
                    class="modern-input"
                    [(ngModel)]="medico.crm"
                    name="crm"
                    placeholder="Ex: 12345-SP"
                    maxlength="12"
                    style="text-transform: uppercase;"
                    required
                              #crmMed="ngModel">
            </div>
            <small class="error-text" *ngIf="crmMed.invalid && crmMed.touched" style="color: #ef4444; font-size: 0.8rem;">CRM é obrigatório</small>
          </div>

          <div class="form-group">
            <label>Especialidade</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
              </svg>
              <input type="text" class="modern-input" [(ngModel)]="medico.especialidade" name="especialidade" placeholder="Ex: Cardiologia" required>
            </div>
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
              </svg>
              <input type="text"
                     class="modern-input"
                     [(ngModel)]="medico.telefone"
                     name="telefone"
                     mask="(00) 00000-0000"
                     placeholder="(00) 00000-0000"
                     [required]="true"
                     #telMed="ngModel">
            </div>
            <small class="error-text" *ngIf="telMed.invalid && telMed.touched" style="color: #ef4444; font-size: 0.8rem;">Telefone incompleto</small>
          </div>

          <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <input type="email" class="modern-input" [(ngModel)]="medico.email" name="email" placeholder="Ex: medico@clinica.com" email [required]="true" #emailMed="ngModel">
            </div>
            <small class="error-text" *ngIf="emailMed.invalid && emailMed.touched" style="color: #ef4444; font-size: 0.8rem;">Formato de e-mail inválido</small>
          </div>

        </div>

        <div class="divider"></div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="medicoForm.invalid">
            {{ isEdicao ? 'Salvar Alterações' : 'Cadastrar Médico' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</section>
