<section class="glass-card form-section" style="max-width: 800px; margin: 0 auto;">
  <div class="card-header">
    <h2>👨‍⚕️ Registar Novo Médico</h2>
    <p class="header-desc">Registe um novo profissional de saúde no sistema.</p>
  </div>

  <form (ngSubmit)="cadastrar()" #medicoForm="ngForm" class="cad-form">

    <div class="form-grid">
      <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" name="nome" [(ngModel)]="medico.nome" placeholder="Dr. António Costa" required>
      </div>
      <div class="input-group">
        <label>CRM</label>
        <input type="text" name="crm" [(ngModel)]="medico.crm" placeholder="Ex: 12345-SP" required>
      </div>
      <div class="input-group">
        <label>Especialidade</label>
        <input type="text" name="especialidade" [(ngModel)]="medico.especialidade" placeholder="Ex: Cardiologia" required>
      </div>
      <div class="input-group">
        <label>Telefone</label>
        <input type="text" name="telefone" [(ngModel)]="medico.telefone" placeholder="Ex: 912345678" required>
      </div>
    </div>

    <hr style="border: 1px solid rgba(0,0,0,0.05); margin: 25px 0;">

    <div class="card-header" style="margin-bottom: 1rem;">
      <h2>🔐 Dados de Acesso do Médico</h2>
    </div>

    <div class="form-grid">
      <div class="input-group">
        <label>E-mail Corporativo</label>
        <input type="email" name="email" [(ngModel)]="medico.email" placeholder="medico@cadmed.com" required>
      </div>
      <div class="input-group">
        <label>Palavra-passe Inicial</label>
        <input type="password" name="senha" [(ngModel)]="medico.senha" placeholder="Defina uma senha" required>
      </div>
    </div>

    <div class="form-actions" style="margin-top: 2rem;">
      <button type="submit" class="btn btn-gradient" [disabled]="!medicoForm.valid">
        Registar Profissional
      </button>
    </div>

    <div *ngIf="mensagem" style="color: #27ae60; background: rgba(46, 204, 113, 0.1); padding: 10px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold;">
      {{ mensagem }}
    </div>

  </form>
</section>
