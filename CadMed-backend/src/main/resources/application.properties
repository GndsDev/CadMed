spring.application.name=CadMed
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cadmed?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

api.security.token.secret=${API_SECURITY_TOKEN_SECRET:admin123}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,http://34.46.214.234}
app.bootstrap.user.enabled=${APP_BOOTSTRAP_USER_ENABLED:false}
app.bootstrap.user.email=${APP_BOOTSTRAP_USER_EMAIL:}
app.bootstrap.user.password=${APP_BOOTSTRAP_USER_PASSWORD:}
app.bootstrap.user.role=${APP_BOOTSTRAP_USER_ROLE:SECRETARIA}

spring.mail.host=${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
